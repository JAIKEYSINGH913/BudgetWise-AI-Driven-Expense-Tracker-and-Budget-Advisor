spring.application.name=budgetwise-backend
server.port=8080

# MongoDB Configuration
spring.data.mongodb.uri=${MONGO_URI}

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

# SMTP Transport Settings
spring.mail.properties.mail.transport.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Timeouts to prevent indefinite hanging
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# File Uploads (Mapping to 'uploads' like Node.js)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=uploads

# AI Configuration
openai.api.key=${GEMINI_API_KEY}
openai.api.url=https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash-lite:generateContent
